# =====================================
# APP CONFIG
# =====================================
spring.config.import=optional:file:.env[.properties],optional:file:.env.${APP_ENV:local}[.properties]
spring.application.name=${APP_NAME:LoveLanguageApp}
server.port=${PORT:8080}

# =====================================
# DATABASE CONFIGURATION - PostgreSQL
# =====================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings optimized for Supabase
# If using Connection Pooler (port 6543): can use 5-10 connections
# If using Direct connection (port 5432): must use 1 connection only
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:2}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.keepalive-time=300000
# CRITICAL: Disable prepared statements for Supabase Connection Pooler
# This fixes "prepared statement already exists" error
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# =====================================
# LOGGING CONFIGURATION
# =====================================
logging.level.root=INFO
logging.level.com.sideproject=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =====================================
# JACKSON CONFIGURATION (JSON serialization)
# =====================================
spring.jackson.serialization.indent-output=true
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# =====================================
# JWT CONFIGURATION
# =====================================
JWT_ACCESSKEY=${JWT_ACCESSKEY:your_jwt_access_secret_key_here_minimum_256_bits_recommended}
JWT_REFRESHKEY=${JWT_REFRESHKEY:your_jwt_refresh_secret_key_here_minimum_256_bits_recommended}
JWT_ACCESSEXPIRATION=${JWT_ACCESSEXPIRATION:900000}
JWT_REFRESHEXPIRATION=${JWT_REFRESHEXPIRATION:604800000}

# =====================================
# EMAIL CONFIGURATION
# =====================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}

# =====================================
# LONGVAN STORAGE (S3-compatible)
# =====================================
longvan.s3.endpoint=${LONGVAN_ENDPOINT:https://s3.longvan.com}
longvan.s3.region=${LONGVAN_REGION:ap-southeast-1}
longvan.s3.bucket=${LONGVAN_BUCKET:your_bucket_name}
longvan.s3.accessKey=${LONGVAN_ACCESS_KEY:your_access_key}
longvan.s3.secretKey=${LONGVAN_SECRET_KEY:your_secret_key}

# =====================================
# THYMELEAF CONFIGURATION
# =====================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# =====================================
# APPLICATION METADATA
# =====================================
app.version=1.0.0

# =====================================
# ACTUATOR CONFIGURATION
# =====================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# =====================================
# ENCODING CONFIGURATION
# =====================================
server.tomcat.uri-encoding=UTF-8
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true

